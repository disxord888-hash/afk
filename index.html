<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報表示ジェネレーター</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 非表示の内部状態管理用 -->
    <input type="hidden" id="input-intensity" value="1">
    <input type="hidden" id="input-magnitude" value="1.0">
    <input type="hidden" id="input-epicenter" value="">
    <input type="hidden" id="input-depth" value="0">
    <input type="hidden" id="input-time" value="">
    <select id="history-select" style="display:none"><option value=""></option></select>
    <textarea id="play-script" style="display:none"></textarea>
    <button id="btn-custom-play" style="display:none"></button>
    <button id="btn-json-export" style="display:none"></button>

    <div class="app-container">        <!-- メイン画面: モニター -->
        <main class="main-display">
            <!-- 全国最大震度 左上 -->
            <div class="japan-max-card" id="japan-max-card">
                <div class="japan-max-header">
                    <span class="japan-max-icon">🗾</span>
                    <span class="japan-max-title">全国最大震度</span>
                </div>
                <div class="japan-max-body">
                    <div class="japan-max-circle" id="japan-max-circle">
                        <span class="japan-max-value" id="japan-max-value">-</span>
                    </div>
                    <div class="japan-max-info">
                        <div class="japan-max-location" id="japan-max-location">--</div>
                        <div class="japan-max-gal" id="japan-max-gal">-- gal</div>
                        <div class="japan-max-time" id="japan-max-time">--</div>
                    </div>
                </div>
            </div>
            <!-- 強震モニタ風 現在地震度カード 右上（モニター外） -->
            <div class="kyoshin-card" id="kyoshin-card">
                <div class="kyoshin-header">
                    <span class="kyoshin-icon">📡</span>
                    <span class="kyoshin-title">現在地付近の震度</span>
                    <span class="kyoshin-live-dot" id="kyoshin-live-dot"></span>
                </div>
                <div class="kyoshin-location-wrap">
                    <select id="kyoshin-pref-select" class="kyoshin-pref-select">
                        <option value="">📍 自動検出中...</option>
                        <option value="北海道">北海道</option>
                        <option value="青森県">青森県</option>
                        <option value="岩手県">岩手県</option>
                        <option value="宮城県">宮城県</option>
                        <option value="秋田県">秋田県</option>
                        <option value="山形県">山形県</option>
                        <option value="福島県">福島県</option>
                        <option value="茨城県">茨城県</option>
                        <option value="栃木県">栃木県</option>
                        <option value="群馬県">群馬県</option>
                        <option value="埼玉県">埼玉県</option>
                        <option value="千葉県">千葉県</option>
                        <option value="東京都">東京都</option>
                        <option value="神奈川県">神奈川県</option>
                        <option value="新潟県">新潟県</option>
                        <option value="富山県">富山県</option>
                        <option value="石川県">石川県</option>
                        <option value="福井県">福井県</option>
                        <option value="山梨県">山梨県</option>
                        <option value="長野県">長野県</option>
                        <option value="岐阜県">岐阜県</option>
                        <option value="静岡県">静岡県</option>
                        <option value="愛知県">愛知県</option>
                        <option value="三重県">三重県</option>
                        <option value="滋賀県">滋賀県</option>
                        <option value="京都府">京都府</option>
                        <option value="大阪府">大阪府</option>
                        <option value="兵庫県">兵庫県</option>
                        <option value="奈良県">奈良県</option>
                        <option value="和歌山県">和歌山県</option>
                        <option value="鳥取県">鳥取県</option>
                        <option value="島根県">島根県</option>
                        <option value="岡山県">岡山県</option>
                        <option value="広島県">広島県</option>
                        <option value="山口県">山口県</option>
                        <option value="徳島県">徳島県</option>
                        <option value="香川県">香川県</option>
                        <option value="愛媛県">愛媛県</option>
                        <option value="高知県">高知県</option>
                        <option value="福岡県">福岡県</option>
                        <option value="佐賀県">佐賀県</option>
                        <option value="長崎県">長崎県</option>
                        <option value="熊本県">熊本県</option>
                        <option value="大分県">大分県</option>
                        <option value="宮崎県">宮崎県</option>
                        <option value="鹿児島県">鹿児島県</option>
                        <option value="沖縄県">沖縄県</option>
                    </select>
                </div>
                <div class="kyoshin-intensity-display">
                    <div class="kyoshin-intensity-circle" id="kyoshin-intensity-circle">
                        <span class="kyoshin-intensity-value" id="kyoshin-intensity-value">-</span>
                    </div>
                </div>
                <div class="kyoshin-gal" id="kyoshin-gal">-- gal</div>
                <div class="kyoshin-status" id="kyoshin-status">接続中...</div>
                <div class="kyoshin-time" id="kyoshin-time">--:--:--</div>
            </div>
            <div class="monitor-wrapper" id="monitor-wrapper">
                <!-- ナビゲーションボタン -->
                <button class="eq-nav-btn eq-nav-prev" id="eq-nav-prev" title="前の地震">＜</button>
                <button class="eq-nav-btn eq-nav-next" id="eq-nav-next" title="次の地震">＞</button>
                <div class="eq-nav-index" id="eq-nav-index"></div>

                <!-- 震源地 上部 -->
                <div class="status-card epicenter-top" id="display-epicenter-card">
                    <div class="monitor-label">震央地名 <span class="title-emoji" id="title-emoji-epi">❌</span></div>
                    <div class="status-value">
                        <span class="value" id="disp-val-epi">--</span>
                    </div>
                    <div class="time-stamp" id="disp-val-time">--</div>
                </div>

                <!-- 震度 中央 -->
                <div class="intensity-center" id="display-intensity-card">
                    <div class="monitor-label">最大震度 <span class="title-emoji" id="title-emoji-int"></span></div>
                    <div class="intensity-value-wrap">
                        <span class="value" id="disp-val-int">-</span>
                    </div>
                </div>

                <!-- マグニチュード 左下 -->
                <div class="status-card magnitude-left" id="display-magnitude-card">
                    <div class="monitor-label">マグニチュード <span class="title-emoji" id="title-emoji-mag"></span></div>
                    <div class="status-value">
                        <span class="prefix">M</span>
                        <span class="value" id="disp-val-mag">--</span>
                    </div>
                </div>

                <!-- 深さ 右下 -->
                <div class="status-card depth-right" id="display-depth-card">
                    <div class="monitor-label">震源の深さ <span class="title-emoji" id="title-emoji-dep"></span></div>
                    <div class="status-value">
                        <span class="value" id="disp-val-dep">--</span>
                        <span class="unit">km</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
